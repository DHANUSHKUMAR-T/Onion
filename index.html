<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Onion Storage Monitoring Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0b1020;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 0;
    }
    header {
      text-align: center;
      padding: 20px;
      background: #111735;
      color: #8ef6ff;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 10px rgba(0,0,0,.5);
    }
    .wrap {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 12px;
      overflow: hidden;
    }
    .charts {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: 300px;
      overflow-y: auto;
      padding-right: 6px;
    }
    header h1 {
        margin: 0;
        font-size: 26px;
      }
      .details-btn {
        margin-top: 15px;
      }
      .details-btn button {
        background: #ff9800;
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
      }
      .details-btn button:hover {
        background: #e68900;
      }
      main {
        padding: 20px;
      }
    .card {
      background: #111735;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid rgba(142,246,255,.15);
    }
    canvas { width: 100% !important; height: 100% !important; }

    /* Latest Values Card */
    .latest {
      background: #1e293b;
      margin-bottom: 12px;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .latest p { margin: 8px 0; font-size: 16px; }
  </style>
</head>
<body>
    <header>
        <h1>🧅 Onion Storage Monitoring Dashboard</h1>
        <div class="details-btn">
          <button onclick="window.location.href='tracking.html'">
    📦 Track Your Agile
</button>
        </div>
      </header>

      

  <div class="wrap">
    <!-- Charts + Latest Values -->
    <div class="charts">
      <div class="latest card">
        <h3>📊 Latest Readings</h3>
        <p>🌡️ Temp: <span id="temperature">--</span> °C</p>
        <p>💧 Humidity: <span id="humidity">--</span> %</p>
        <p>🔥 MQ2 Gas: <span id="mq2">--</span></p>
        <p>🌫 MQ135 Gas: <span id="mq135">--</span></p>
        <p>🌀 Fan: <span id="fan">--</span></p>
      </div>
      <div class="card"><canvas id="tempChart"></canvas></div>
      <div class="card"><canvas id="humChart"></canvas></div>
      <div class="card"><canvas id="mq2Chart"></canvas></div>
      <div class="card"><canvas id="mq135Chart"></canvas></div>
      <div class="card"><canvas id="fanChart"></canvas></div>
    </div>
  </div>

  <!-- ===================== JS ====================== -->
  <script>
    async function fetchData() {
        try {
          let res = await fetch("https://api.thingspeak.com/channels/2864954/feeds/last.json?api_key=2QHEX8CPIVDRY0WN");
          let data = await res.json();
          document.getElementById("temp").textContent = data.field1;
          document.getElementById("humidity").textContent = data.field2;
          document.getElementById("mq2").textContent = data.field3;
          document.getElementById("mq135").textContent = data.field4;
          document.getElementById("fan").textContent = data.field5 == "1" ? "ON" : "OFF";
        } catch (err) {
          console.log("Error fetching data:", err);
        }
      }
  
      fetchData();
      setInterval(fetchData, 20000);
    // ==== CONFIG ====
    const CHANNEL_ID = 2864954;
    const RESULTS = 30;
    const READ_KEY = "2QHEX8CPIVDRY0WN";

    // ==== Charts ====
    function createChart(ctx, label, color){
      return new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets:[{label, data:[], borderColor:color, borderWidth:2, tension:.3}] },
        options:{
          responsive:true, maintainAspectRatio:false,
          scales:{ x:{ticks:{color:'#aaa'}}, y:{ticks:{color:'#aaa'}} },
          plugins:{ legend:{ labels:{ color:'#fff' } } }
        }
      });
    }

    const tempChart = createChart(document.getElementById('tempChart'), "Temperature (°C)", "#ff6384");
    const humChart  = createChart(document.getElementById('humChart'), "Humidity (%)", "#36a2eb");
    const mq2Chart  = createChart(document.getElementById('mq2Chart'), "MQ2", "#ffcd56");
    const mq135Chart= createChart(document.getElementById('mq135Chart'), "MQ135", "#4bc0c0");
    const fanChart  = createChart(document.getElementById('fanChart'), "Fan (0=OFF,1=ON)", "#9966ff");

    async function fetchData(){
      const url=`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?results=${RESULTS}&api_key=${READ_KEY}`;
      const res=await fetch(url);
      const data=await res.json();
      return data.feeds || [];
    }

    async function refresh(){
      const feeds = await fetchData();
      if(feeds.length === 0) return;

      const labels = feeds.map(f=> new Date(f.created_at).toLocaleTimeString());

      tempChart.data.labels = labels;
      humChart.data.labels  = labels;
      mq2Chart.data.labels  = labels;
      mq135Chart.data.labels= labels;
      fanChart.data.labels  = labels;

      tempChart.data.datasets[0].data = feeds.map(f=> Number(f.field1));
      humChart.data.datasets[0].data  = feeds.map(f=> Number(f.field2));
      mq2Chart.data.datasets[0].data  = feeds.map(f=> Number(f.field3));
      mq135Chart.data.datasets[0].data= feeds.map(f=> Number(f.field4));
      fanChart.data.datasets[0].data  = feeds.map(f=> Number(f.field5)||0);

      tempChart.update(); humChart.update(); mq2Chart.update(); mq135Chart.update(); fanChart.update();

      // Update Latest Values
      const last = feeds[feeds.length-1];
      document.getElementById("temperature").textContent = last.field1 || "--";
      document.getElementById("humidity").textContent    = last.field2 || "--";
      document.getElementById("mq2").textContent         = last.field3 || "--";
      document.getElementById("mq135").textContent       = last.field4 || "--";
      document.getElementById("fan").textContent         = (last.field5 == "1") ? "ON" : "OFF";
    }

    setInterval(refresh,20000);
    refresh();
  </script>
</body>
</html>
